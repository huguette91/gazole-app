<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gazole">
<title>Brent & Gazole - IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#7a8299;
  --accent:#4f8ef7;--orange:#f7894f;--green:#3dd68c;
  --red:#f75f5f;--purple:#b07ff7;--yellow:#f7d44f;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none;font-size:14px;}
.app{display:flex;flex-direction:column;height:100dvh;}
.topbar{padding:12px 18px 10px;padding-top:calc(12px + var(--safe-top));background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.app-name{font-size:18px;font-weight:800;}
.app-name span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;background:rgba(79,142,247,0.12);color:var(--accent);border:1px solid rgba(79,142,247,0.25);}
.date-line{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.sync-btn{display:flex;align-items:center;gap:5px;background:rgba(61,214,140,0.1);border:1px solid rgba(61,214,140,0.25);color:var(--green);font-family:var(--mono);font-size:9px;font-weight:500;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
.sync-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}
@keyframes spin{to{transform:rotate(360deg);}}
.sync-btn.loading svg{animation:spin 0.8s linear infinite;}
.status-bar{font-size:9px;font-family:var(--mono);padding:5px 18px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(72px + var(--safe-bottom));}
.page{display:none;}.page.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.orange::before{background:var(--orange);}.kpi.blue::before{background:var(--accent);}.kpi.green::before{background:var(--green);}.kpi.purple::before{background:var(--purple);}
.kpi-label{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.kpi-value{font-size:20px;font-weight:800;font-family:var(--mono);line-height:1;}
.kpi-sub{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.card-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:10px;}
.ftable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;margin-top:10px;}
.ftable th{text-align:left;padding:5px 4px;color:var(--muted);border-bottom:1px solid var(--border);}
.ftable td{padding:6px 4px;border-bottom:1px solid var(--border);}
.formula{font-family:var(--mono);font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--orange);margin-top:10px;white-space:pre-line;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:9px;font-weight:700;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;margin-bottom:3px;}
.cfg-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);padding:10px;border-radius:10px;margin-bottom:10px;}
.cfg-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-name">Brent<span> & </span>Gazole</div>
      <div class="topbar-right">
        <div class="badge" id="badge-lag">IA XGBOOST</div>
        <button class="sync-btn" id="syncBtn">
          <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Sync
        </button>
      </div>
    </div>
    <div class="date-line" id="dateRange">Chargement...</div>
  </div>
  <div class="status-bar" id="statusBar" style="display:none;"><div class="status-dot"></div><span id="statusMsg"></span></div>

  <div class="content" id="content">
    <div class="page active" id="page-apercu">
      <div class="kpi-grid">
        <div class="kpi orange"><div class="kpi-label">Gazole</div><div class="kpi-value" id="kpi-gazole">—</div><div class="kpi-sub" id="kpi-gazole-sub">—</div></div>
        <div class="kpi blue"><div class="kpi-label">Brent EUR</div><div class="kpi-value" id="kpi-brent">—</div><div class="kpi-sub" id="kpi-brent-sub">—</div></div>
      </div>
      <div class="card">
        <div class="card-title">Prix à la pompe et Brent</div>
        <div style="height:220px"><canvas id="cApercu"></canvas></div>
      </div>
    </div>

    <div class="page" id="page-prevision">
      <div class="card">
        <div class="card-title">Prévision IA XGBoost (10 jours)</div>
        <div class="card-sub" id="sub-forecast">Basé sur le comportement "Plume et Fusée"</div>
        <div style="height:210px"><canvas id="cForecast"></canvas></div>
        <div style="overflow-x:auto">
          <table class="ftable">
            <thead><tr><th>Date</th><th>Statut</th><th>Prévu</th><th>Tendance</th></tr></thead>
            <tbody id="ftbody"></tbody>
          </table>
        </div>
        <div class="formula" id="formula-text">En attente des données de l'IA...</div>
      </div>
    </div>

    <div class="page" id="page-config">
      <div class="card">
        <div class="card-title">⚙️ Configuration GitHub</div>
        <input class="cfg-input" type="password" id="cfg-token" placeholder="Token GitHub">
        <input class="cfg-input" type="text" id="cfg-repo" placeholder="huguette91/prix-gasoil">
        <input class="cfg-input" type="text" id="cfg-path" placeholder="data/historique.csv">
        <button class="cfg-save" id="cfg-save-btn">Enregistrer</button>
      </div>
    </div>
  </div>

  <nav class="bottomnav">
    <button class="nav-btn active" data-page="apercu"><svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8"/><rect x="10" y="9" width="4" height="12"/><rect x="17" y="5" width="4" height="16"/></svg>Aperçu</button>
    <button class="nav-btn" data-page="prevision"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>IA</button>
    <button class="nav-btn" data-page="config"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Config</button>
  </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CFG={
  get token(){return localStorage.getItem('gh_token')||'';},
  get repo(){return localStorage.getItem('gh_repo')||'huguette91/prix-gasoil';},
  get path(){return localStorage.getItem('gh_path')||'data/historique.csv';},
  set token(v){localStorage.setItem('gh_token',v);},
  set repo(v){localStorage.setItem('gh_repo',v);},
  set path(v){localStorage.setItem('gh_path',v);}
};

let DATA=[], CHARTS={}, OPT_LAG=16;

const DEF={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{x:{ticks:{font:{size:9},color:'#7a8299'}},y:{ticks:{font:{size:9},color:'#7a8299'}}}
};

async function fetchCSV(){
  if(!CFG.token){showStatus('Token manquant','err');return;}
  setLoading(true);
  showStatus('Synchro GitHub…','loading');
  try{
    const headers={Authorization:`token ${CFG.token}`,Accept:'application/vnd.github.v3.raw'};
    
    // 1. Historique
    const resCSV=await fetch(`https://api.github.com/repos/${CFG.repo}/contents/${CFG.path}`,{headers});
    const text=await resCSV.text();
    parseCSV(text);

    // 2. Prévisions IA
    const resJSON=await fetch(`https://api.github.com/repos/${CFG.repo}/contents/data/previsions.json`,{headers});
    if(resJSON.ok) window.AI_FORECASTS = await resJSON.json();
    else window.AI_FORECASTS = [];

    showStatus(`✓ Données IA à jour`,'ok');
    rebuildAll();
  }catch(e){showStatus(`Erreur : ${e.message}`,'err');}
  finally{setLoading(false);}
}

function parseCSV(text){
  const lines=text.trim().split('\n').filter(l=>l&&!l.startsWith('sep='));
  const h=lines[0].split(';');
  DATA=lines.slice(1).map(l=>{
    const c=l.split(';');
    return{date:c[0],g:parseFloat(c[1]),beur:parseFloat(c[3])};
  }).filter(r=>!isNaN(r.g));
}

function rebuildAll(){
  if(!DATA.length)return;
  const last=DATA[DATA.length-1];
  document.getElementById('dateRange').textContent=`Dernier relevé : ${fmtDate(last.date)}`;

  // Aperçu KPIs
  T('kpi-gazole',`${last.g.toFixed(3)}€`);
  T('kpi-brent',`${last.beur.toFixed(2)}€`);

  // Graphique Aperçu
  const labels=DATA.slice(-30).map(d=>shortDate(d.date));
  DC('cApercu');
  CHARTS.cApercu=new Chart(ge('cApercu'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Brent €',data:DATA.slice(-30).map(d=>d.beur),borderColor:'#4f8ef7',yAxisID:'y',pointRadius:0},
        {label:'Gazole',data:DATA.slice(-30).map(d=>d.g),borderColor:'#f7894f',yAxisID:'y1',pointRadius:0}
      ]
    },
    options:{...DEF,scales:{x:DEF.scales.x,y:{position:'left'},y1:{position:'right',grid:{display:false}}}}
  });

  // PREVISIONS IA
  const FC = window.AI_FORECASTS || [];
  T('sub-forecast', `Prévisions XGBoost · à partir du ${fmtDate(last.date)}`);
  T('formula-text', `Modèle : XGBoost (Asymétrique)\nStatus : Prédit sur ${FC.length} jours`);

  const tb=ge('ftbody'); tb.innerHTML='';
  FC.forEach((f,i)=>{
    const prev=i===0?last.g:FC[i-1].prix;
    const diff=f.prix-prev;
    const arr=diff>0.001?'<span style="color:var(--red)">▲</span>':diff<-0.001?'<span style="color:var(--green)">▼</span>':'<span style="color:var(--muted)">→</span>';
    tb.innerHTML+=`<tr><td>${f.date.split('-').slice(1).reverse().join('/')}</td><td>Stable</td><td style="font-weight:700">${f.prix.toFixed(3)}€</td><td>${arr}</td></tr>`;
  });

  // Graphique Prévision
  const last8=DATA.slice(-8);
  const fLabels=[...last8.map(d=>shortDate(d.date)),...FC.map(f=>f.date.split('-')[2])];
  const hLine=[...last8.map(d=>d.g),...Array(FC.length).fill(null)];
  const pLine=[...Array(last8.length-1).fill(null),last.g,...FC.map(f=>f.prix)];

  DC('cForecast');
  CHARTS.cForecast=new Chart(ge('cForecast'),{
    type:'line',
    data:{
      labels:fLabels,
      datasets:[
        {label:'Historique',data:hLine,borderColor:'#f7894f',pointRadius:0,borderWidth:2},
        {label:'Prévision IA',data:pLine,borderColor:'#3dd68c',backgroundColor:'rgba(61,214,140,0.1)',fill:true,pointRadius:3}
      ]
    },
    options:DEF
  });
}

function ge(id){return document.getElementById(id);}
function T(id,txt){if(ge(id))ge(id).textContent=txt;}
function DC(id){if(CHARTS[id])CHARTS[id].destroy();}
function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function shortDate(d){return d.split('-').slice(1).reverse().join('/');}
function showStatus(msg,type){const b=ge('statusBar');b.style.display='flex';ge('statusMsg').textContent=msg;if(type==='ok')setTimeout(()=>b.style.display='none',3000);}
function setLoading(on){ge('syncBtn').classList.toggle('loading',on);}

// NAV & INIT
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    ge('page-'+btn.dataset.page).classList.add('active');btn.classList.add('active');
  });
});
ge('cfg-save-btn').addEventListener('click',()=>{
  CFG.token=ge('cfg-token').value; CFG.repo=ge('cfg-repo').value; CFG.path=ge('cfg-path').value;
  fetchCSV();
});
window.addEventListener('DOMContentLoaded',()=>{
  ge('cfg-token').value=CFG.token; ge('cfg-repo').value=CFG.repo; ge('cfg-path').value=CFG.path;
  if(CFG.token)fetchCSV();
});
</script>
</body>
</html>
